name: Deploy to TestFlight

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Prepare Apple API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${KEY_ID}.p8

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VoltAsist.xcodeproj \
            -scheme VoltAsist

      - name: Build Archive
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project VoltAsist.xcodeproj \
            -scheme VoltAsist \
            -archivePath build/VoltAsist.xcarchive \
            -destination "generic/platform=iOS" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${KEY_ID}.p8" \
            -allowProvisioningUpdates

      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath build/VoltAsist.xcarchive \
            -exportPath build/Output \
            -exportOptionsPlist ExportOptions.plist \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${KEY_ID}.p8" \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f build/Output/VoltAsist.ipa \
            -t ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"
