workflows:
  ios-release:
    name: VoltAsist iOS TestFlight Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: VoltAsist
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ersensen.voltasist
      groups:
        - ios_signing
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.ersensen.voltasist"
        XCODE_PROJECT: "VoltAsist.xcodeproj"
        XCODE_SCHEME: "VoltAsist"
    scripts:
      - name: Generate Xcode Project via XcodeGen
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Set up keychain
        script: |
          keychain initialize
          keychain add-certificates
      - name: Build and Archive
        script: |
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/VoltAsist.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/VoltAsist.xcarchive \
            -exportPath build/Output \
            -exportOptionsPlist ExportOptions.plist
    artifacts:
      - build/Output/*.ipa
    publishing:
      email:
        recipients:
          - ersenzekisen@gmail.com
      app_store_connect:
        auth: integration
        submit_to_testflight: true
