name: VoltAsist
options:
  bundleIdPrefix: com.ersensen
  projectFormat: 55
targets:
  VoltAsist:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        DEVELOPMENT_TEAM: 9DM9S4CD3U
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen: {}
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.ersensen.voltasist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "6"
        SWIFT_VERSION: "5.9"
        OTHER_SWIFT_FLAGS: ""
      configs:
        debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.ersensen.voltasist
        release:
          PRODUCT_BUNDLE_IDENTIFIER: com.ersensen.voltasist
schemes:
  VoltAsist:
    build:
      targets:
        VoltAsist: all
    archive:
      config: Release
